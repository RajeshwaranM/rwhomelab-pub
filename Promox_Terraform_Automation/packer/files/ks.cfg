# Rocky Linux 9 Golden Template Kickstart Configuration
text
skipx
eula --agreed

# Language and Time Settings
lang en_US.UTF-8
keyboard us
timezone Asia/Kolkata --utc

# Network Configuration
network --bootproto=dhcp --device=link --activate --onboot=on

# Security configuration
rootpw --plaintext PackerBuildPassword123!
user --name=packer --groups=wheel --password=PackerBuildPassword123! --plaintext

# Firewalls and Services
firewall --enabled --ssh
services --enabled="qemu-guest-agent,sshd,cloud-init"
selinux --enforcing

# Disk Partitioning Configuration (Clean Wipe, Direct Layout)
bootloader --location=mbr
clearpart --all --initlabel
autopart --type=lvm

# Core Installation Sources (Tells the Boot ISO where to fetch packages)
url --url="https://dl.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/"
repo --name="AppStream" --baseurl="https://dl.rockylinux.org/pub/rocky/9/AppStream/x86_64/os/"

# Package Installation Selection
%packages
@^minimal-environment
qemu-guest-agent
cloud-init
curl
git
tar
%end

# Post-Installation Scripts
%post --log=/var/log/kickstart_post.log
# 1. Grant passwordless sudo access to the packer user
echo "packer ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers.d/packer
chmod 0440 /etc/sudoers.d/packer

# 2. Configure Cloud-Init for Proxmox (Matches the 99-pve.cfg datasource logic)
mkdir -p /etc/cloud/cloud.cfg.d
echo "datasource_list: [ ConfigDrive, NoCloud ]" > /etc/cloud/cloud.cfg.d/99-pve.cfg
chmod 0644 /etc/cloud/cloud.cfg.d/99-pve.cfg

# 3. Clean up unique machine identifiers for safe image cloning
truncate -s 0 /etc/machine-id
rm -f /etc/udev/rules.d/70-persistent-net.rules
%end

reboot
